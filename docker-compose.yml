# ---------------------------------------------------------
# BusinessHub ERP - Docker Compose
#
# The `database` service (SQL Server) is ready to use for local development:
#   docker compose up -d database
# The frontend/backend Dockerfiles are NOT implemented yet, so their `build`
# blocks are placeholders for the intended topology.
# ---------------------------------------------------------
version: "3.9"

services:
  # ----- React frontend (Vite) -----
  frontend:
    build:
      context: ./businesshub-client
    container_name: businesshub-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    # command: npm run dev
    # volumes:
    #   - ./businesshub-client:/app

  # ----- Node.js / Express backend -----
  backend:
    build:
      context: ./businesshub-server
    container_name: businesshub-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - database
    # command: npm run dev
    # volumes:
    #   - ./businesshub-server:/app

  # ----- Microsoft SQL Server -----
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: businesshub-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "${DB_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mssql_data:
